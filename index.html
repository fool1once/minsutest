<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filipino Quiz Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
  background:linear-gradient(135deg,#081c15,#1b4332,#2d6a4f);
  color:white;
  overflow-x:hidden;
}

/* NAVIGATION */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  position:sticky;
  top:0;
}

nav a{
  margin:0 8px;
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
  transition:.3s;
}

nav a.active{
  background:#00ff88;
  color:black;
}

/* TABS */
.tab{display:none;padding:30px;}
.tab.active{display:block;animation:fade .4s;}
@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

/* HERO */
.hero{text-align:center;margin-top:80px;}
.title{font-size:60px;text-shadow:0 0 20px #00ff88;}
input{padding:12px;border:none;border-radius:10px;margin-top:15px;}
.btn{padding:12px 25px;margin-top:15px;border:none;border-radius:25px;background:#00ff88;cursor:pointer;font-weight:bold;transition:.3s;}
.btn:hover{transform:scale(1.05);}

/* GAME BOX */
.game-box{
  max-width:550px;
  margin:auto;
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:15px;
  backdrop-filter:blur(12px);
  box-shadow:0 0 20px rgba(0,255,136,0.3);
}
.answers button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#52b788;
  color:white;
  cursor:pointer;
  transition:.2s;
}
.answers button:hover{background:#74c69d;}

/* TIMER BAR */
.timer-bar{
  height:8px;
  background:#00ff88;
  width:100%;
  margin-bottom:10px;
  transition:width 1s linear;
}

/* LEADERBOARD */
#leaderboard li{
  background:white;
  color:black;
  margin:8px auto;
  padding:10px;
  border-radius:10px;
  width:260px;
}

/* MOBILE */
@media(max-width:768px){.title{font-size:40px;}}
</style>
</head>
<body>

<header class="navbar">
  <h2>Filipino Quiz</h2>
  <nav>
    <a class="link active" data-tab="home">Home</a>
    <a class="link" data-tab="play">Play</a>
    <a class="link" data-tab="leader">Leaderboard</a>
  </nav>
</header>

<!-- HOME -->
<section id="home" class="tab active">
  <div class="hero">
    <h1 class="title">FILIPINO QUIZ</h1>
    <input id="playerName" placeholder="Enter your name">
    <br>
    <button class="btn" onclick="startGame()">Start Game</button>
    <br>
    <button class="btn" onclick="showAdminButton()">Admin Access</button>
  </div>
</section>

<!-- GAME -->
<section id="play" class="tab">
  <div class="game-box">
    <div class="timer-bar" id="bar"></div>
    <h3 id="q"></h3>
    <div id="ans" class="answers"></div>
    <p>Score: <span id="score">0</span></p>
  </div>
</section>

<!-- LEADERBOARD -->
<section id="leader" class="tab">
  <h2>🏆 Leaderboard</h2>
  <ul id="leaderboard"></ul>
  <button class="btn" onclick="adminReset()" id="adminResetBtn" style="display:none;">Reset Leaderboard</button>
</section>

<audio id="correct" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
// NAVIGATION
const links=document.querySelectorAll('.link');
const tabs=document.querySelectorAll('.tab');
links.forEach(l=>{
  l.onclick=()=>{
    links.forEach(x=>x.classList.remove('active'));
    tabs.forEach(t=>t.classList.remove('active'));
    l.classList.add('active');
    document.getElementById(l.dataset.tab).classList.add('active');
  }
});

// 15 UNIQUE QUESTIONS
const questions=[
{q:"Ano ang tawag sa pinakamaliit na yunit ng wika?",a:["Ponema","Morpema","Sintaks","Diskurso"],c:0},
{q:"Ano ang pag-aaral ng kahulugan ng salita?",a:["Ponolohiya","Semantika","Sintaks","Pragmatika"],c:1},
{q:"Ano ang ayos ng pangungusap?",a:["Sintaks","Diskurso","Ponema","Morpema"],c:0},
{q:"Ano ang paraan ng pagbuo ng salita?",a:["Morpolohiya","Sintaks","Semantika","Ponolohiya"],c:0},
{q:"Ano ang tawag sa pangungusap na nagbibigay utos?",a:["Pautos","Patanong","Padamdam","Pasalaysay"],c:0},
{q:"Ano ang pokus ng pandiwa na tumutukoy sa simuno?",a:["Pokus ng Aktor","Pokus ng Layon","Pokus ng Tagatanggap","Pokus ng Ganapan"],c:0},
{q:"Ano ang tawag sa pag-aaral ng tunog ng wika?",a:["Ponolohiya","Semantika","Morpema","Sintaks"],c:0},
{q:"Ano ang tawag sa pag-aaral ng kaayusan ng salita at pangungusap?",a:["Sintaks","Semantika","Ponolohiya","Pragmatika"],c:0},
{q:"Ano ang tawag sa paggamit ng wika sa lipunan?",a:["Pragmatika","Ponolohiya","Morpolohiya","Diskurso"],c:0},
{q:"Ano ang tawag sa pinakamalawak na yunit ng wika?",a:["Diskurso","Sintaks","Ponema","Morpema"],c:0},
{q:"Ano ang tawag sa salita o yunit na may kahulugan?",a:["Morpema","Ponema","Sintaks","Diskurso"],c:0},
{q:"Ano ang gamit ng pandiwa sa pangungusap?",a:["Nagpapahayag ng kilos","Nagpapakita ng tunog","Nagpapakita ng ayos","Nagpapahayag ng diskurso"],c:0},
{q:"Ano ang tawag sa tanong na pangungusap?",a:["Patanong","Pautos","Pasalaysay","Padamdam"],c:0},
{q:"Ano ang tawag sa pangungusap na nagpapahayag ng damdamin?",a:["Padamdam","Pasalaysay","Pautos","Patanong"],c:0},
{q:"Ano ang tawag sa pangungusap na nagsasalaysay?",a:["Pasalaysay","Padamdam","Pautos","Patanong"],c:0}
];

// GAME STATE
let i=0,score=0,timer,player="",time=10;

// START GAME
function startGame(){
  player=document.getElementById('playerName').value.trim();
  if(!player) return alert("Enter your name!");
  document.querySelector('[data-tab="play"]').click();
  i=0;score=0;
  loadQ();
}

// LOAD QUESTION
function loadQ(){
  clearInterval(timer);
  time=10;
  document.getElementById('bar').style.width="100%";

  let q=questions[i];
  document.getElementById('q').innerText=q.q;
  let ans=document.getElementById('ans');
  ans.innerHTML="";
  q.a.forEach((choice,index)=>{
    let btn=document.createElement('button');
    btn.innerText=choice;
    btn.onclick=()=>check(index);
    ans.appendChild(btn);
  });

  timer=setInterval(()=>{
    time--;
    document.getElementById('bar').style.width=(time*10)+"%";
    if(time<=0) nextQ();
  },1000);
}

// CHECK ANSWER
function check(index){
  let q=questions[i];
  if(index===q.c){
    score++;
    document.getElementById('correct').play();
  } else {
    document.getElementById('wrong').play();
  }
  nextQ();
}

// NEXT QUESTION
function nextQ(){
  clearInterval(timer);
  i++;
  document.getElementById('score').innerText=score;
  if(i<questions.length){
    loadQ();
  } else {
    saveScore();
    alert("Game Over! Score: "+score);
    document.querySelector('[data-tab="leader"]').click();
  }
}

// SAVE SCORE
function saveScore(){
  let data=JSON.parse(localStorage.getItem("scores"))||[];
  data.push({name:player,score});
  localStorage.setItem("scores",JSON.stringify(data));
  loadBoard();
}

// LOAD LEADERBOARD
function loadBoard(){
  let data=JSON.parse(localStorage.getItem("scores"))||[];
  data.sort((a,b)=>b.score-a.score);
  let list=document.getElementById("leaderboard");
  list.innerHTML="";
  data.forEach(p=>{
    let li=document.createElement("li");
    li.innerText=`${p.name} - ${p.score}`;
    list.appendChild(li);
  });
}

// ADMIN RESET
function adminReset(){
  const password=prompt("Enter admin password to reset leaderboard:");
  const ADMIN_PASSWORD="admin123"; // change this to your password
  if(password===ADMIN_PASSWORD){
    localStorage.removeItem("scores");
    loadBoard();
    alert("Leaderboard has been reset by admin!");
  } else {
    alert("Incorrect password!");
  }
}

// ADMIN BUTTON VISIBILITY
function showAdminButton(){
  const password=prompt("Enter admin password:");
  const ADMIN_PASSWORD="admin123"; // same password
  if(password===ADMIN_PASSWORD){
    document.getElementById("adminResetBtn").style.display="inline-block";
    alert("Admin access granted!");
  } else {
    alert("Wrong password!");
  }
}

loadBoard();
</script>
</body>
</html>
