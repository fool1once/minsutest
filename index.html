<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#b7e4c7,#95d5b2);
}

/* NAV */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#00a651;
  color:white;
}

.logo{display:flex;align-items:center;gap:10px;}
.logo img{width:40px;border-radius:50%;}

/* TABS */
.tab{display:none;padding:40px;}
.tab.active{display:block;}

/* HERO */
.hero{text-align:center;margin-top:60px;}

.big{
  font-size:100px;
  font-weight:900;
  color:#00a651;
  text-shadow:0 0 15px #00ff88;
}

/* BUTTON */
.btn{
  padding:12px 25px;
  margin-top:10px;
  border:none;
  border-radius:25px;
  background:#00a651;
  color:white;
  cursor:pointer;
}

/* GAME BOX */
.game-box{
  max-width:500px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
}

/* ✅ FIXED ANSWERS */
#ans button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#52b788;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:.2s;
}

#ans button:hover{
  transform:scale(1.03);
  box-shadow:0 0 10px rgba(0,255,136,0.6);
}

/* TIMER */
.timer-bar{
  height:8px;
  background:#00a651;
  margin-bottom:10px;
}

/* LEADERBOARD COOL DESIGN */
#leaderboard{
  list-style:none;
  padding:0;
}

#leaderboard li{
  margin:12px auto;
  padding:15px;
  width:280px;
  border-radius:12px;
  background:white;
  font-weight:bold;
  text-align:center;
  transition:.3s;
}

/* TOP 3 STYLING */
#leaderboard li:nth-child(1){
  background:linear-gradient(45deg,#ffd700,#fff4b3);
  box-shadow:0 0 20px gold;
}
#leaderboard li:nth-child(2){
  background:linear-gradient(45deg,#c0c0c0,#eaeaea);
  box-shadow:0 0 15px silver;
}
#leaderboard li:nth-child(3){
  background:linear-gradient(45deg,#cd7f32,#f5c6a5);
  box-shadow:0 0 15px #cd7f32;
}

#leaderboard li:hover{
  transform:scale(1.05);
}

/* INPUT */
input{
  padding:10px;
  border-radius:10px;
  border:none;
}

</style>
</head>

<body>

<header class="navbar">
  <div class="logo">
    <img src="assets/logo.png">
    <h3>Minsu</h3>
  </div>
</header>

<section id="home" class="tab active">
  <div class="hero">
    <h1 class="big">MINI GAME</h1>
    <input id="playerName" placeholder="Enter name">
    <br>
    <button class="btn" onclick="startGame()">Start Game</button>
  </div>
</section>

<section id="play" class="tab">
  <div class="game-box">
    <div class="timer-bar" id="bar"></div>
    <p id="progress"></p>
    <h3 id="q"></h3>
    <div id="ans"></div>
    <p>Score: <span id="score">0</span></p>
  </div>
</section>

<section id="leader" class="tab">
  <h2 style="text-align:center;">🏆 Leaderboard</h2>
  <ul id="leaderboard"></ul>
</section>

<script>

/* QUESTIONS */
const questions=[
{q:"Ano ang tawag sa pinakamaliit na yunit ng wika?",a:["Ponema","Morpema","Sintaks","Diskurso"],c:0},
{q:"Ano ang pag-aaral ng kahulugan ng salita?",a:["Ponolohiya","Semantika","Sintaks","Pragmatika"],c:1},
{q:"Ano ang ayos ng pangungusap?",a:["Sintaks","Diskurso","Ponema","Morpema"],c:0},
{q:"Ano ang paraan ng pagbuo ng salita?",a:["Morpolohiya","Sintaks","Semantika","Ponolohiya"],c:0},
{q:"Ano ang tawag sa pangungusap na nagbibigay utos?",a:["Pautos","Patanong","Padamdam","Pasalaysay"],c:0},
{q:"Ano ang pokus ng pandiwa na tumutukoy sa simuno?",a:["Pokus ng Aktor","Pokus ng Layon","Pokus ng Tagatanggap","Pokus ng Ganapan"],c:0},
{q:"Ano ang tawag sa pag-aaral ng tunog ng wika?",a:["Ponolohiya","Semantika","Morpema","Sintaks"],c:0},
{q:"Ano ang tawag sa pag-aaral ng kaayusan ng salita?",a:["Sintaks","Semantika","Ponolohiya","Pragmatika"],c:0},
{q:"Ano ang tawag sa paggamit ng wika sa lipunan?",a:["Pragmatika","Ponolohiya","Morpolohiya","Diskurso"],c:0},
{q:"Ano ang tawag sa pinakamalawak na yunit ng wika?",a:["Diskurso","Sintaks","Ponema","Morpema"],c:0},
{q:"Ano ang tawag sa salita o yunit na may kahulugan?",a:["Morpema","Ponema","Sintaks","Diskurso"],c:0},
{q:"Ano ang gamit ng pandiwa sa pangungusap?",a:["Nagpapahayag ng kilos","Nagpapakita ng tunog","Nagpapakita ng ayos","Nagpapahayag ng diskurso"],c:0},
{q:"Ano ang tawag sa tanong na pangungusap?",a:["Patanong","Pautos","Pasalaysay","Padamdam"],c:0},
{q:"Ano ang tawag sa pangungusap na nagpapahayag ng damdamin?",a:["Padamdam","Pasalaysay","Pautos","Patanong"],c:0},
{q:"Ano ang tawag sa pangungusap na nagsasalaysay?",a:["Pasalaysay","Padamdam","Pautos","Patanong"],c:0}
];

let i=0,score=0,player="";

function startGame(){
  player=document.getElementById('playerName').value;
  document.getElementById("home").classList.remove("active");
  document.getElementById("play").classList.add("active");
  i=0;score=0;
  loadQ();
}

function loadQ(){
  let q=questions[i];
  document.getElementById('q').innerText=q.q;
  document.getElementById('progress').innerText=`Question ${i+1}/15`;

  let ans=document.getElementById('ans');
  ans.innerHTML="";

  q.a.forEach((choice,index)=>{
    let btn=document.createElement('button');
    btn.innerText=choice;
    btn.onclick=()=>check(index,btn);
    ans.appendChild(btn);
  });
}

function check(index,btn){
  if(index===questions[i].c){
    score++;
    btn.style.background="#00ff88";
  }else{
    btn.style.background="#ff4d4d";
  }
  setTimeout(nextQ,600);
}

function nextQ(){
  i++;
  document.getElementById('score').innerText=score;

  if(i<questions.length){
    loadQ();
  }else{
    saveScore();
    alert("Game Over! Score: "+score);
    document.getElementById("play").classList.remove("active");
    document.getElementById("leader").classList.add("active");
  }
}

/* LEADERBOARD */
function saveScore(){
  let data=JSON.parse(localStorage.getItem("scores"))||[];
  data.push({name:player,score});
  localStorage.setItem("scores",JSON.stringify(data));
  loadBoard();
}

function loadBoard(){
  let data=JSON.parse(localStorage.getItem("scores"))||[];
  data.sort((a,b)=>b.score-a.score);

  let list=document.getElementById("leaderboard");
  list.innerHTML="";
  data.forEach(p=>{
    let li=document.createElement("li");
    li.innerText=`${p.name} - ${p.score}`;
    list.appendChild(li);
  });
}

loadBoard();

</script>

</body>
</html>
