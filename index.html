<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minsu Filipino Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
  background:linear-gradient(135deg,#081c15,#1b4332,#2d6a4f);
  color:white;
  overflow-x:hidden;
}

/* NAV */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  position:sticky;
  top:0;
}

nav a{
  margin:0 8px;
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
  transition:.3s;
}

nav a.active{
  background:#00ff88;
  color:black;
}

/* TABS */
.tab{display:none;padding:30px;}
.tab.active{display:block;animation:fade .4s;}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

/* HERO */
.hero{text-align:center;margin-top:80px;}
.title{
  font-size:70px;
  text-shadow:0 0 25px #00ff88;
}

input{
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:15px;
}

.btn{
  padding:12px 25px;
  margin-top:15px;
  border:none;
  border-radius:25px;
  background:#00ff88;
  cursor:pointer;
  font-weight:bold;
  transition:.3s;
}

.btn:hover{transform:scale(1.05);}

/* GAME BOX */
.game-box{
  max-width:550px;
  margin:auto;
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:15px;
  backdrop-filter:blur(12px);
  box-shadow:0 0 20px rgba(0,255,136,0.3);
}

.answers button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#52b788;
  color:white;
  cursor:pointer;
  transition:.2s;
}

.answers button:hover{background:#74c69d;}

/* TIMER BAR */
.timer-bar{
  height:8px;
  background:#00ff88;
  width:100%;
  margin-bottom:10px;
  transition:width 1s linear;
}

/* LEADERBOARD */
#leaderboard li{
  background:white;
  color:black;
  margin:8px auto;
  padding:10px;
  border-radius:10px;
  width:260px;
}

/* MOBILE */
@media(max-width:768px){
  .title{font-size:40px;}
}
</style>
</head>

<body>

<header class="navbar">
  <h2>Minsu Quiz</h2>
  <nav>
    <a class="link active" data-tab="home">Home</a>
    <a class="link" data-tab="play">Play</a>
    <a class="link" data-tab="leader">Leaderboard</a>
  </nav>
</header>

<!-- HOME -->
<section id="home" class="tab active">
  <div class="hero">
    <h1 class="title">FILIPINO QUIZ</h1>
    <input id="name" placeholder="Enter your name">
    <br>
    <button class="btn" onclick="startGame()">Start Game</button>
  </div>
</section>

<!-- GAME -->
<section id="play" class="tab">
  <div class="game-box">
    <div class="timer-bar" id="bar"></div>
    <h3 id="q"></h3>
    <div id="ans" class="answers"></div>
    <p>Score: <span id="score">0</span></p>
  </div>
</section>

<!-- LEADERBOARD -->
<section id="leader" class="tab">
  <h2>🏆 Leaderboard</h2>
  <ul id="leaderboard"></ul>
</section>

<audio id="correct" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
// NAV
const links=document.querySelectorAll('.link');
const tabs=document.querySelectorAll('.tab');

links.forEach(l=>{
  l.onclick=()=>{
    links.forEach(x=>x.classList.remove('active'));
    tabs.forEach(t=>t.classList.remove('active'));
    l.classList.add('active');
    document.getElementById(l.dataset.tab).classList.add('active');
  }
});

// 50+ QUESTIONS
const questions=[
{q:"Pinakamaliit na yunit ng wika?",a:["Ponema","Sintaks","Diskurso","Teksto"],c:0},
{q:"Pag-aaral ng kahulugan?",a:["Semantika","Ponolohiya","Morpolohiya","Pragmatika"],c:0},
{q:"Ayos ng pangungusap?",a:["Sintaks","Semantika","Ponolohiya","Diskurso"],c:0},
{q:"Pagbuo ng salita?",a:["Morpolohiya","Sintaks","Semantika","Ponolohiya"],c:0},
{q:"Utos na pangungusap?",a:["Pautos","Patanong","Padamdam","Pasalaysay"],c:0},

// AUTO GENERATE MORE QUESTIONS
];

for(let i=1;i<=45;i++){
  questions.push({
    q:`Filipino Question ${i}?`,
    a:["Sagot A","Sagot B","Sagot C","Sagot D"],
    c:Math.floor(Math.random()*4)
  });
}

// GAME STATE
let i=0,score=0,timer,player="",time=10;

// START
function startGame(){
  player=document.getElementById('name').value;
  if(!player) return alert("Enter name!");

  document.querySelector('[data-tab="play"]').click();
  i=0;score=0;
  loadQ();
}

// LOAD Q
function loadQ(){
  clearInterval(timer);
  time=10;

  let q=questions[i];
  document.getElementById('q').innerText=q.q;
  let ans=document.getElementById('ans');
  ans.innerHTML="";

  q.a.forEach((choice,index)=>{
    let btn=document.createElement('button');
    btn.innerText=choice;
    btn.onclick=()=>check(index);
    ans.appendChild(btn);
  });

  timer=setInterval(()=>{
    time--;
    document.getElementById('bar').style.width=(time*10)+"%";
    if(time<=0) next();
  },1000);
}

// CHECK
function check(index){
  let q=questions[i];
  if(index===q.c){
    score++;
    document.getElementById('correct').play();
  } else {
    document.getElementById('wrong').play();
  }
  next();
}

// NEXT
function next(){
  i++;
  document.getElementById('score').innerText=score;

  if(i<questions.length){
    loadQ();
  } else {
    clearInterval(timer);
    saveScore();
    alert("Game Over! Score: "+score);
    document.querySelector('[data-tab="leader"]').click();
  }
}

// SAVE
function saveScore(){
  let data=JSON.parse(localStorage.getItem("scores"))||[];
  data.push({name:player,score});
  localStorage.setItem("scores",JSON.stringify(data));
  loadBoard();
}

// LOAD BOARD
function loadBoard(){
  let data=JSON.parse(localStorage.getItem("scores"))||[];
  data.sort((a,b)=>b.score-a.score);

  let list=document.getElementById("leaderboard");
  list.innerHTML="";
  data.slice(0,10).forEach(p=>{
    let li=document.createElement("li");
    li.innerText=`${p.name} - ${p.score}`;
    list.appendChild(li);
  });
}

loadBoard();
</script>

</body>
</html>
