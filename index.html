<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game Quiz</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* BODY */
body{
  background:#c7e8d4;
  overflow-x:hidden;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#00a651;
  color:white;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:40px;
  height:40px;
  border-radius:50%;
}

nav a{
  margin:0 10px;
  padding:10px 18px;
  border-radius:20px;
  cursor:pointer;
  transition:.3s;
  color:white;
}

nav a.active{
  background:#d8f3dc;
  color:#00a651;
}

/* TABS */
.tab{
  display:none;
  padding:40px;
}

.tab.active{
  display:block;
  animation:fade .4s;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

/* HERO */
.hero{
  text-align:center;
  margin-top:60px;
}

.small{
  font-style:italic;
  color:#888;
}

.big{
  font-size:110px;
  font-weight:900;
  color:#00a651;
  text-shadow: 
    4px 4px 0px #ffffff,
    8px 8px 20px rgba(0,0,0,0.2);
}

.subtitle{
  color:#666;
  margin-top:10px;
}

/* INPUT + BUTTON */
input{
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:20px;
}

.btn{
  padding:12px 25px;
  margin-top:10px;
  border:none;
  border-radius:25px;
  background:#00a651;
  color:white;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* GAME BOX */
.game-box{
  max-width:500px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.answers button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#52b788;
  color:white;
  cursor:pointer;
}

.timer-bar{
  height:8px;
  background:#00a651;
  margin-bottom:10px;
}

/* LEADERBOARD */
#leaderboard li{
  background:white;
  margin:8px auto;
  padding:10px;
  border-radius:10px;
  width:250px;
}

/* MOBILE */
@media(max-width:768px){
  .big{font-size:60px;}
}
</style>
</head>

<body>

<header class="navbar">
  <div class="logo">
    <img src="assets/logo.png">
    <h3>Minsu</h3>
  </div>

  <nav>
    <a class="link active" data-tab="home">Home</a>
    <a class="link" data-tab="play">Play</a>
    <a class="link" data-tab="leader">Leaderboards</a>
  </nav>
</header>

<!-- HOME -->
<section id="home" class="tab active">
  <div class="hero">
    <p class="small">Welcome</p>
    <p class="small">to our</p>
    <h1 class="big">MINI GAME</h1>
    <p class="subtitle">Welcome to our game</p>

    <input id="playerName" placeholder="Enter your name">
    <br>
    <button class="btn" onclick="startGame()">Start Game</button>
    <br>
    <button class="btn" onclick="showAdminButton()">Admin</button>
  </div>
</section>

<!-- GAME -->
<section id="play" class="tab">
  <div class="game-box">
    <div class="timer-bar" id="bar"></div>
    <h3 id="q"></h3>
    <div id="ans" class="answers"></div>
    <p>Score: <span id="score">0</span></p>
  </div>
</section>

<!-- LEADERBOARD -->
<section id="leader" class="tab">
  <h2>🏆 Leaderboards</h2>
  <ul id="leaderboard"></ul>
  <button class="btn" onclick="adminReset()" id="adminResetBtn" style="display:none;">Reset</button>
</section>

<audio id="correct" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

/* NAVIGATION (FIXED & CLEAN) */
const links=document.querySelectorAll('.link');
const tabs=document.querySelectorAll('.tab');

links.forEach(l=>{
  l.onclick=()=>{
    links.forEach(x=>x.classList.remove('active'));
    tabs.forEach(t=>t.classList.remove('active'));
    l.classList.add('active');
    document.getElementById(l.dataset.tab).classList.add('active');
  }
});

/* QUESTIONS */
const questions=[
{q:"Ano ang tawag sa pinakamaliit na yunit ng wika?",a:["Ponema","Morpema","Sintaks","Diskurso"],c:0},
{q:"Ano ang pag-aaral ng kahulugan ng salita?",a:["Ponolohiya","Semantika","Sintaks","Pragmatika"],c:1},
{q:"Ano ang ayos ng pangungusap?",a:["Sintaks","Diskurso","Ponema","Morpema"],c:0}
];

let i=0,score=0,timer,player="",time=10;

/* START */
function startGame(){
  player=document.getElementById('playerName').value.trim();
  if(!player) return alert("Enter name!");
  document.querySelector('[data-tab="play"]').click();
  i=0;score=0;
  loadQ();
}

/* LOAD */
function loadQ(){
  clearInterval(timer);
  time=10;
  document.getElementById('bar').style.width="100%";

  let q=questions[i];
  document.getElementById('q').innerText=q.q;
  let ans=document.getElementById('ans');
  ans.innerHTML="";

  q.a.forEach((choice,index)=>{
    let btn=document.createElement('button');
    btn.innerText=choice;
    btn.onclick=()=>check(index);
    ans.appendChild(btn);
  });

  timer=setInterval(()=>{
    time--;
    document.getElementById('bar').style.width=(time*10)+"%";
    if(time<=0) nextQ();
  },1000);
}

/* CHECK */
function check(index){
  if(index===questions[i].c){
    score++;
    correct.play();
  } else wrong.play();
  nextQ();
}

/* NEXT */
function nextQ(){
  clearInterval(timer);
  i++;
  scoreDisplay();
  if(i<questions.length){
    loadQ();
  } else {
    saveScore();
    alert("Game Over! Score: "+score);
    document.querySelector('[data-tab="leader"]').click();
  }
}

function scoreDisplay(){
  document.getElementById('score').innerText=score;
}

/* LEADERBOARD */
function saveScore(){
  let data=JSON.parse(localStorage.getItem("scores"))||[];
  data.push({name:player,score});
  localStorage.setItem("scores",JSON.stringify(data));
  loadBoard();
}

function loadBoard(){
  let data=JSON.parse(localStorage.getItem("scores"))||[];
  data.sort((a,b)=>b.score-a.score);

  let list=document.getElementById("leaderboard");
  list.innerHTML="";

  data.forEach(p=>{
    let li=document.createElement("li");
    li.innerText=`${p.name} - ${p.score}`;
    list.appendChild(li);
  });
}

/* ADMIN */
function adminReset(){
  if(prompt("Password?")==="admin123"){
    localStorage.removeItem("scores");
    loadBoard();
    alert("Reset done");
  }
}

function showAdminButton(){
  if(prompt("Admin password")==="admin123"){
    document.getElementById("adminResetBtn").style.display="block";
  }
}

loadBoard();

</script>

</body>
</html>
