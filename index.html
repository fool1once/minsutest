<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minsu Mini Game</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #b7e4c7, #52b788);
  color: #333;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: rgba(0,166,81,0.9);
  backdrop-filter: blur(10px);
  color: white;
  position: sticky;
  top: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 45px;
  border-radius: 50%;
}

nav a {
  margin: 0 10px;
  cursor: pointer;
  padding: 10px 15px;
  border-radius: 20px;
  transition: 0.3s;
}

nav a.active {
  background: white;
  color: #00a651;
}

nav a:hover {
  background: #d8f3dc;
  color: #00a651;
}

/* MOBILE */
.menu-toggle {
  display: none;
  font-size: 25px;
  cursor: pointer;
}

/* TABS */
.tab {
  display: none;
  padding: 40px;
  animation: fade 0.5s ease;
}

.tab.active {
  display: block;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 60px;
}

.title {
  font-size: 100px;
  color: #00a651;
  text-shadow: 4px 4px white, 0 0 20px #00ff88;
}

.btn {
  background: #00a651;
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  margin-top: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #007f3f;
  transform: scale(1.05);
}

/* GAME */
.game-box {
  background: white;
  padding: 25px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.answers button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #d8f3dc;
  cursor: pointer;
  transition: 0.3s;
}

.answers button:hover {
  background: #95d5b2;
}

/* LEADERBOARD */
#leaderboard li {
  background: white;
  margin: 8px auto;
  padding: 10px;
  border-radius: 10px;
  width: 250px;
  text-align: center;
}

/* ANIMATION */
@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

/* MOBILE */
@media(max-width:768px){
  nav {
    position: absolute;
    top: 60px;
    right: 0;
    background: #00a651;
    flex-direction: column;
    display: none;
  }
  nav.show { display: flex; }
  .menu-toggle { display: block; }
  .title { font-size: 60px; }
}
</style>
</head>

<body>

<header class="navbar">
  <div class="logo">
    <img src="assets/logo.png">
    <span>Minsu</span>
  </div>

  <div class="menu-toggle" id="menu">☰</div>

  <nav id="nav">
    <a class="link active" data-tab="home">Home</a>
    <a class="link" data-tab="play">Play</a>
    <a class="link" data-tab="about">About</a>
    <a class="link" data-tab="leader">Leaderboard</a>
  </nav>
</header>

<!-- HOME -->
<section id="home" class="tab active">
  <div class="hero">
    <h2>Welcome to</h2>
    <h1 class="title">MINI GAME</h1>
    <button class="btn" onclick="goPlay()">Start Game</button>
  </div>
</section>

<!-- GAME -->
<section id="play" class="tab">
  <div class="game-box">
    <h2 id="question">Question</h2>
    <div class="answers" id="answers"></div>
    <p>Score: <span id="score">0</span></p>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="tab">
  <h2>About</h2>
  <p>This game teaches Filipino alphabet and words in a fun way.</p>
</section>

<!-- LEADERBOARD -->
<section id="leader" class="tab">
  <h2>🏆 Leaderboard</h2>
  <ul id="leaderboard"></ul>
</section>

<!-- SOUND -->
<audio id="correct" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
// NAVIGATION
const links = document.querySelectorAll('.link');
const tabs = document.querySelectorAll('.tab');
const nav = document.getElementById('nav');

links.forEach(link=>{
  link.onclick=()=>{
    links.forEach(l=>l.classList.remove('active'));
    tabs.forEach(t=>t.classList.remove('active'));
    link.classList.add('active');
    document.getElementById(link.dataset.tab).classList.add('active');
    nav.classList.remove('show');
  }
});

document.getElementById('menu').onclick=()=>nav.classList.toggle('show');

function goPlay(){
  document.querySelector('[data-tab="play"]').click();
}

// GAME DATA (FILIPINO ABC)
const questions = [
  {q:"A is for?", a:["Aso","Bahay","Isda"], correct:0},
  {q:"B is for?", a:["Aso","Bahay","Kubo"], correct:1},
  {q:"K is for?", a:["Kubo","Araw","Dagat"], correct:0},
  {q:"D is for?", a:["Dagat","Bituin","Ulap"], correct:0}
];

let index=0;
let score=0;

function loadQ(){
  let q = questions[index];
  document.getElementById('question').innerText = q.q;
  let ansDiv = document.getElementById('answers');
  ansDiv.innerHTML="";
  
  q.a.forEach((ans,i)=>{
    let btn=document.createElement('button');
    btn.innerText=ans;
    btn.onclick=()=>check(i);
    ansDiv.appendChild(btn);
  });
}

function check(i){
  let q = questions[index];
  if(i===q.correct){
    score++;
    document.getElementById('correct').play();
  } else {
    document.getElementById('wrong').play();
  }

  document.getElementById('score').innerText=score;
  index++;

  if(index<questions.length){
    loadQ();
  } else {
    saveScore();
    alert("Game Over! Score: "+score);
    index=0; score=0;
    loadQ();
  }
}

// LEADERBOARD
function saveScore(){
  let name = prompt("Enter your name:");
  let data = JSON.parse(localStorage.getItem("scores"))||[];
  data.push({name,score});
  localStorage.setItem("scores", JSON.stringify(data));
  loadBoard();
}

function loadBoard(){
  let data = JSON.parse(localStorage.getItem("scores"))||[];
  data.sort((a,b)=>b.score-a.score);

  let list=document.getElementById("leaderboard");
  list.innerHTML="";
  data.forEach(p=>{
    let li=document.createElement("li");
    li.innerText=`${p.name} - ${p.score}`;
    list.appendChild(li);
  });
}

loadQ();
loadBoard();
</script>

</body>
</html>
